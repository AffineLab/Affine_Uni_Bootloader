name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            gcc-arm-none-eabi \
            git \
            libnewlib-arm-none-eabi \
            ninja-build \
            openssl \
            python3

      - name: Run CI checks
        run: bash tools/ci.sh

      - name: Upload bootloader binaries
        uses: actions/upload-artifact@v6
        with:
          name: bootloader-binaries
          if-no-files-found: error
          retention-days: 14
          path: |
            build-ci/stm32g431/bootloader_stm32g431.bin
            build-ci/stm32f072/bootloader_stm32f072.bin
            build-ci/stm32h503/bootloader_stm32h503.bin

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bootloader-debug-artifacts
          if-no-files-found: error
          retention-days: 14
          path: |
            build-ci/stm32g431/bootloader_stm32g431.elf
            build-ci/stm32g431/bootloader_stm32g431.map
            build-ci/stm32f072/bootloader_stm32f072.elf
            build-ci/stm32f072/bootloader_stm32f072.map
            build-ci/stm32h503/bootloader_stm32h503.elf
            build-ci/stm32h503/bootloader_stm32h503.map
